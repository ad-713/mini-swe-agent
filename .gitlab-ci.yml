stages:
  - listen

mini-swe-agent-listener:
  stage: listen
  image: python:3.11
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - pip install -e .
    - apt-get update && apt-get install -y docker.io
  script:
    - python3 src/minisweagent/run/gitlab_listener.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "push"
      when: manual
